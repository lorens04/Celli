<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berangkat Bareng Yuk!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #ffdde1;
            background-image: linear-gradient(315deg, #ffdde1 0%, #ee9ca7 74%);
            overflow: hidden; /* Mencegah layar bisa di-scroll saat tombol kabur */
        }
        h1, h2 {
            font-family: 'Fredoka One', cursive;
        }
        .heart-float {
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        
        /* Default transition untuk pergerakan halus */
        #btn-tidak {
            transition: all 0.2s ease-out;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
        }
        
        #btn-mau {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            top: 0;
            z-index: 10;
            white-space: nowrap;
        }

        /* Layout awal sebelum tombol bergerak */
        .initial-layout {
            display: flex;
            justify-content: center;
            align-items: center; /* Tombol berbentuk pil rapi */
            gap: 1rem;
        }
        .initial-layout #btn-mau, .initial-layout #btn-tidak {
            position: relative;
            left: auto;
            transform: none;
        }

        /* Animasi Love Jatuh di Background */
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0.8; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
        .falling-heart {
            position: fixed;
            top: -10vh;
            z-index: 1; /* Di belakang card utama */
            animation: fall linear forwards;
            pointer-events: none;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Container Utama ditambahkan id="main-card" -->
    <div id="main-card" class="bg-white/80 backdrop-blur-md p-8 rounded-3xl shadow-2xl text-center max-w-md w-full border-4 border-pink-300 relative z-10">
        
        <!-- Floating Hearts -->
        <div class="flex justify-center gap-4 mb-6">
            <span class="text-4xl heart-float" style="animation-delay: 0s;">💖</span>
            <span class="text-5xl heart-float" style="animation-delay: 0.5s;">💝</span>
            <span class="text-4xl heart-float" style="animation-delay: 1s;">💖</span>
        </div>

        <h1 class="text-3xl text-pink-600 mb-2">Halo Celli! 👋</h1>
        <p class="text-lg text-gray-700 mb-6 font-semibold">Besok pagi kita berangkat bareng yuk?</p>
        
        <!-- Area Tombol -->
        <div id="action-area" class="initial-layout mt-6 h-24 relative w-full">
            <button id="btn-mau" class="bg-gradient-to-r from-pink-500 to-rose-500 hover:from-pink-600 hover:to-rose-600 text-white font-bold py-3 px-6 rounded-full shadow-lg transform hover:scale-110 transition duration-300 z-20 text-lg">
                MAU BANGET! 😍
            </button>

            <button id="btn-tidak" class="bg-gray-400 hover:bg-gray-500 text-white font-bold py-3 px-6 rounded-full shadow-md z-10 text-lg cursor-not-allowed">
                Nggak Dulu
            </button>
        </div>
    </div>

    <!-- Background Decor -->
    <div class="fixed top-10 left-10 text-6xl opacity-20">✨</div>
    <div class="fixed bottom-20 right-10 text-6xl opacity-20">🌸</div>
    <div class="fixed top-1/3 right-1/4 text-4xl opacity-20">💕</div>
    <div class="fixed bottom-1/4 left-1/4 text-5xl opacity-20">💌</div>

    <!-- Copyright Lorens -->
    <div class="fixed bottom-4 w-full text-center text-pink-600/80 font-bold text-sm z-20 pointer-events-none tracking-wide">
        &copy; 2026 Lorens. All rights reserved.
    </div>

    <!-- Audio Player (File Lokal) -->
    <audio id="bg-music" loop>
        <!-- Pastikan file never-not.mp3 ada di folder yang sama nanti -->
        <source src="never-not.mp3" type="audio/mpeg">
        Browser kamu tidak mendukung tag audio.
    </audio>

    <script>
        const btnTidak = document.getElementById('btn-tidak');
        const actionArea = document.getElementById('action-area');
        const btnMau = document.getElementById('btn-mau');
        const bgMusic = document.getElementById('bg-music');
        
        let isMoving = false;
        let musicStarted = false;

        // Fungsi untuk memulai musik saat ada interaksi pertama
        function startMusic() {
            if (!musicStarted) {
                bgMusic.volume = 0.5; // Atur volume 50%
                bgMusic.currentTime = 10; // Langsung lompat ke detik 52 (bagian reff)
                bgMusic.play().then(() => {
                    musicStarted = true;
                    console.log("Musik dimulai.");
                }).catch(e => {
                    console.error("Browser memblokir autoplay, menunggu interaksi klik.");
                });
            }
        }

        // Fungsi untuk menggerakkan tombol Tidak
        function moveButton(e) {
            if(!isMoving) {
                actionArea.classList.remove('initial-layout');
                
                // Set tombol mau ke tengah
                btnMau.style.position = 'absolute';
                btnMau.style.top = '0px';
                btnMau.style.left = '50%';
                btnMau.style.transform = 'translateX(-50%)';

                // Keluarkan tombol tidak dari card agar bebas di seluruh layar
                document.body.appendChild(btnTidak);
                
                btnTidak.style.position = 'fixed';
                btnTidak.style.zIndex = '9999';
                isMoving = true;
            }

            // Dapatkan dimensi layar & tombol
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;
            const btnWidth = btnTidak.offsetWidth;
            const btnHeight = btnTidak.offsetHeight;
            const padding = 20;

            // Batasan aman (tidak keluar layar)
            const maxX = Math.max(padding, windowWidth - btnWidth - padding);
            const maxY = Math.max(padding, windowHeight - btnHeight - padding);

            // Posisi acak
            const randomX = Math.max(padding, Math.floor(Math.random() * (maxX - padding + 1)) + padding);
            const randomY = Math.max(padding, Math.floor(Math.random() * (maxY - padding + 1)) + padding);

            // Pindahkan tombol
            btnTidak.style.left = `${randomX}px`;
            btnTidak.style.top = `${randomY}px`;
            btnTidak.style.transform = 'none'; 
            btnTidak.style.margin = '0';
        }

        // Event listeners untuk tombol kabur
        btnTidak.addEventListener('mouseover', moveButton);
        btnTidak.addEventListener('touchstart', (e) => {
            e.preventDefault(); 
            moveButton(e);
        });

        // Mainkan musik pada interaksi pertama dengan layar
        document.body.addEventListener('click', startMusic, { once: true });
        document.body.addEventListener('touchstart', startMusic, { once: true });

        // Aksi ketika tombol Mau diklik
        btnMau.addEventListener('click', () => {
            // Hapus tombol Nggak Dulu selamanya
            if (btnTidak) {
                btnTidak.remove();
            }

            // Siapkan link WhatsApp (62 adalah pengganti 0)
            const noWA = "6281996182925"; 
            const pesanWA = encodeURIComponent("jemput aku ya sayangg, jam 10.00 🥰♥️");
            const linkWA = `https://wa.me/${noWA}?text=${pesanWA}`;

            // Ubah tampilan card menggunakan ID yang lebih aman dipanggil JavaScript
            const card = document.getElementById('main-card');
            
            if (card) {
                card.innerHTML = `
                    <div class="text-6xl mb-4">🥰</div>
                    <h1 class="text-3xl text-pink-600 mb-4 font-bold">Yeyyy! Asikkk! 🎉</h1>
                    <p class="text-xl text-gray-700 font-semibold mb-2">See you tomorrow, sayang! ❤️</p>
                    <p class="text-md text-gray-500 mb-8">Jangan lupa kabari aku yaa 🚗💨</p>
                    
                    <!-- Tombol Pindah ke WA -->
                    <a href="${linkWA}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center justify-center gap-2 bg-[#25D366] hover:bg-[#128C7E] text-white font-bold py-3 px-8 rounded-full shadow-lg transform hover:scale-110 transition duration-300 text-lg w-full max-w-[250px] mx-auto">
                        Pindah ke WA 💬
                    </a>
                `;
                
                createConfetti();
            }
        });

        // Fungsi Confetti Emoji
        function createConfetti() {
            const emojis = ['💖', '🎉', '🌸', '✨', '😍'];
            for(let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                    confetti.style.position = 'fixed';
                    confetti.style.left = Math.random() * 100 + 'vw';
                    confetti.style.top = '-50px';
                    confetti.style.fontSize = (Math.random() * 20 + 10) + 'px';
                    confetti.style.zIndex = '9999';
                    confetti.style.transition = 'top 3s ease-in, transform 3s ease-out';
                    
                    document.body.appendChild(confetti);

                    setTimeout(() => {
                        confetti.style.top = '100vh';
                        confetti.style.transform = `rotate(${Math.random() * 360}deg) translateX(${Math.random() * 100 - 50}px)`;
                    }, 50);

                    setTimeout(() => {
                        confetti.remove();
                    }, 3000);
                }, i * 50);
            }
        }

        // Fungsi Background Love Jatuh
        function startFallingHearts() {
            const heartIcons = ['💖', '💕', '💗', '💓', '💘', '🤍'];
            setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'falling-heart';
                heart.innerText = heartIcons[Math.floor(Math.random() * heartIcons.length)];
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = (Math.random() * 4 + 4) + 's'; 
                heart.style.fontSize = (Math.random() * 1.5 + 1) + 'rem';
                
                document.body.appendChild(heart);

                setTimeout(() => {
                    heart.remove();
                }, 8000);
            }, 400); 
        }

        // Mulai animasi
        startFallingHearts();
    </script>
</body>
</html>
