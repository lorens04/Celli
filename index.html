<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berangkat Bareng Yuk!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #ffdde1;
            background-image: linear-gradient(315deg, #ffdde1 0%, #ee9ca7 74%);
            overflow: hidden; /* Prevent scrolling when button moves */
        }
        h1, h2 {
            font-family: 'Fredoka One', cursive;
        }
        .heart-float {
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        
        /* Container for absolute positioning of 'No' button */
        #button-container {
            position: relative;
            height: 150px; /* Give some space for movement */
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
        }

        /* Default transition for smooth moving */
        #btn-tidak {
            transition: all 0.2s ease-out;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap; /* Mencegah teks turun baris */
        }
        
        #btn-mau {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            top: 0;
            z-index: 10;
            white-space: nowrap;
        }

        /* Initial layout when not moving */
        .initial-layout {
            display: flex;
            justify-content: center;
            align-items: center; /* Memperbaiki tombol yang memanjang (stretch) */
            gap: 1rem;
        }
        .initial-layout #btn-mau {
            position: relative;
            left: auto;
            transform: none;
        }
        .initial-layout #btn-tidak {
            position: relative;
            left: auto;
            transform: none;
        }

        /* Animasi Love Jatuh di Background */
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0.8; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
        .falling-heart {
            position: fixed;
            top: -10vh;
            z-index: 1; /* Di belakang card utama */
            animation: fall linear forwards;
            pointer-events: none;
        }

    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Container Utama -->
    <div class="bg-white/80 backdrop-blur-md p-8 rounded-3xl shadow-2xl text-center max-w-md w-full border-4 border-pink-300 relative z-10">
        
        <!-- Floating Hearts -->
        <div class="flex justify-center gap-4 mb-6">
            <span class="text-4xl heart-float" style="animation-delay: 0s;">💖</span>
            <span class="text-5xl heart-float" style="animation-delay: 0.5s;">💝</span>
            <span class="text-4xl heart-float" style="animation-delay: 1s;">💖</span>
        </div>

        <h1 class="text-3xl text-pink-600 mb-2">Halo Celli! 👋</h1>
        <p class="text-lg text-gray-700 mb-6 font-semibold">Besok pagi kita berangkat bareng yuk?</p>
        
        <!-- action-area h-32 memastikan ada ruang cukup saat tombol berubah absolute -->
        <div id="action-area" class="initial-layout mt-6 h-24 relative w-full">
            <!-- Tombol Mau (ukuran lebih pas) -->
            <button id="btn-mau" class="bg-gradient-to-r from-pink-500 to-rose-500 hover:from-pink-600 hover:to-rose-600 text-white font-bold py-3 px-6 rounded-full shadow-lg transform hover:scale-110 transition duration-300 z-20 text-lg">
                MAU BANGET! 😍
            </button>

            <!-- Tombol Tidak (Yang akan bergerak) -->
            <button id="btn-tidak" class="bg-gray-400 hover:bg-gray-500 text-white font-bold py-3 px-6 rounded-full shadow-md z-10 text-lg cursor-not-allowed">
                Nggak Dulu
            </button>
        </div>
    </div>

    <!-- Background Decor -->
    <div class="fixed top-10 left-10 text-6xl opacity-20">✨</div>
    <div class="fixed bottom-20 right-10 text-6xl opacity-20">🌸</div>
    <div class="fixed top-1/3 right-1/4 text-4xl opacity-20">💕</div>
    <div class="fixed bottom-1/4 left-1/4 text-5xl opacity-20">💌</div>

    <!-- Copyright Lorens -->
    <div class="fixed bottom-4 w-full text-center text-pink-600/80 font-bold text-sm z-20 pointer-events-none tracking-wide">
        &copy; 2026 Lorens. All rights reserved.
    </div>

    <!-- Audio Player (File Lokal) -->
    <audio id="bg-music" loop>
        <!-- Pastikan nama file di bawah ini SAMA PERSIS dengan nama file mp3 kamu -->
        <source src="never-not.mp3" type="audio/mpeg">
        Browser kamu tidak mendukung tag audio.
    </audio>

    <script>
        const btnTidak = document.getElementById('btn-tidak');
        const actionArea = document.getElementById('action-area');
        const btnMau = document.getElementById('btn-mau');
        const bgMusic = document.getElementById('bg-music');
        
        let isMoving = false;
        let musicStarted = false;

        // Fungsi untuk memulai musik saat ada interaksi pertama
        function startMusic() {
            if (!musicStarted) {
                bgMusic.volume = 0.5; // Atur volume 50%
                bgMusic.currentTime = 06; // Langsung lompat ke detik 52 (bagian reff)
                bgMusic.play().then(() => {
                    musicStarted = true;
                    console.log("Musik dimulai.");
                }).catch(e => {
                    console.error("Browser memblokir autoplay, menunggu interaksi klik dari user.");
                });
            }
        }

        // Fungsi untuk menggerakkan tombol Tidak dengan batasan layar yang ketat
        function moveButton(e) {
            // Hapus pemanggilan startMusic() di sini karena bisa jadi belum dianggap interaksi "klik"
            
            if(!isMoving) {
                actionArea.classList.remove('initial-layout');
                
                btnMau.style.position = 'absolute';
                btnMau.style.top = '0px';
                btnMau.style.left = '50%';
                btnMau.style.transform = 'translateX(-50%)';

                // KUNCI PERBAIKAN: Keluarkan tombol dari card utama 
                // agar posisinya akurat sesuai ukuran layar (viewport)
                document.body.appendChild(btnTidak);
                
                btnTidak.style.position = 'fixed';
                btnTidak.style.zIndex = '9999'; // Pastikan selalu paling atas
                isMoving = true;
            }

            // Dapatkan dimensi layar yang terlihat saat ini
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;
            
            // Dapatkan dimensi tombol
            const btnWidth = btnTidak.offsetWidth;
            const btnHeight = btnTidak.offsetHeight;

            // Padding agar tidak menempel di pojok layar banget
            const padding = 20;

            // Pastikan nilai max tidak pernah negatif
            const maxX = Math.max(padding, windowWidth - btnWidth - padding);
            const maxY = Math.max(padding, windowHeight - btnHeight - padding);

            // Generate posisi acak secara aman (selalu di antara padding dan max)
            const randomX = Math.max(padding, Math.floor(Math.random() * (maxX - padding + 1)) + padding);
            const randomY = Math.max(padding, Math.floor(Math.random() * (maxY - padding + 1)) + padding);

            // Aplikasikan posisi baru
            btnTidak.style.left = `${randomX}px`;
            btnTidak.style.top = `${randomY}px`;
            btnTidak.style.transform = 'none'; // Menghapus translateX agar left & top presisi
            btnTidak.style.margin = '0';
        }

        // Trigger on hover for desktop
        btnTidak.addEventListener('mouseover', moveButton);
        // Trigger on touch for mobile
        btnTidak.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Mencegah klik di HP
            moveButton(e);
        });

        // PERBAIKAN MUSIK: Pastikan musik main pada KLIK PERTAMA di mana saja
        document.body.addEventListener('click', startMusic, { once: true });
        document.body.addEventListener('touchstart', startMusic, { once: true });


        // Aksi ketika tombol Mau diklik
        btnMau.addEventListener('click', () => {
            // Hapus tombol "Nggak Dulu" dari layar
            if (btnTidak) {
                btnTidak.remove();
            }

            // Ubah konten card
            const card = document.querySelector('.bg-white\\/80');
            card.innerHTML = `
                <div class="text-6xl mb-4">🥰</div>
                <h1 class="text-3xl text-pink-600 mb-4 font-bold">Yeyyy! Asikkk! 🎉</h1>
                <p class="text-xl text-gray-700 font-semibold mb-2">See you tomorrow, sayang! ❤️</p>
                <p class="text-md text-gray-500">Aku jemput yaa 🚗💨</p>
            `;
            
            // Create confetti effect using emojis
            createConfetti();
        });

        // Simple emoji confetti function
        function createConfetti() {
            const emojis = ['💖', '🎉', '🌸', '✨', '😍'];
            for(let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                    confetti.style.position = 'fixed';
                    confetti.style.left = Math.random() * 100 + 'vw';
                    confetti.style.top = '-50px';
                    confetti.style.fontSize = (Math.random() * 20 + 10) + 'px';
                    confetti.style.zIndex = '9999';
                    confetti.style.transition = 'top 3s ease-in, transform 3s ease-out';
                    
                    document.body.appendChild(confetti);

                    // Start animation shortly after appending
                    setTimeout(() => {
                        confetti.style.top = '100vh';
                        confetti.style.transform = `rotate(${Math.random() * 360}deg) translateX(${Math.random() * 100 - 50}px)`;
                    }, 50);

                    // Clean up
                    setTimeout(() => {
                        confetti.remove();
                    }, 3000);
                }, i * 50); // Stagger creation
            }
        }

        // Fungsi untuk membuat love bergerak jatuh di background
        function startFallingHearts() {
            const heartIcons = ['💖', '💕', '💗', '💓', '💘', '🤍'];
            setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'falling-heart';
                heart.innerText = heartIcons[Math.floor(Math.random() * heartIcons.length)];
                
                // Posisi horizontal acak
                heart.style.left = Math.random() * 100 + 'vw';
                // Kecepatan jatuh acak antara 4 hingga 8 detik
                heart.style.animationDuration = (Math.random() * 4 + 4) + 's'; 
                // Ukuran acak
                heart.style.fontSize = (Math.random() * 1.5 + 1) + 'rem';
                
                document.body.appendChild(heart);

                // Hapus elemen setelah selesai animasi agar tidak membuat lag
                setTimeout(() => {
                    heart.remove();
                }, 8000);
            }, 400); // Munculkan love setiap 400 milidetik
        }

        // Jalankan animasi background saat halaman dimuat
        startFallingHearts();
    </script>
</body>
</html>
